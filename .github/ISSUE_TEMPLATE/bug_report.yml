name: Relatório de Bug
description: Crie um relatório para nos ajudar a melhorar o projeto
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por dedicar seu tempo para relatar este problema!
  - type: textarea
    id: description
    attributes:
      label: Descrição do Bug
      description: Uma descrição clara e concisa sobre qual é o bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Passos para Reproduzir
      description: Como podemos reproduzir este problema no nosso lado?
      placeholder: |
        1. Ir em '...'
        2. Clicar em '....'
        3. Rolar para baixo até '....'
        4. Ver o erro
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento Esperado
      description: Uma descrição clara e concisa do que você esperava que acontecesse.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Ambiente
      description: Detalhes sobre o ambiente onde o bug ocorreu (SO, versão do Node, navegador, etc.)
